services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: searchengine
      POSTGRES_PASSWORD: searchengine
      POSTGRES_DB: search_engine
    ports:
      - "5432:5432"
    networks:
      - kafka-net
    volumes:
      - postgres-data:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:latest
    container_name: kafka-broker
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9094,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9094,INTERNAL://kafka-broker:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # FIXED: Point Kafka's internal metadata log storage to the volume path
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    networks:
      - kafka-net
    volumes:
      # FIXED: Maps the internal data directory to a permanent local Docker volume
      - kafka-data:/var/lib/kafka/data

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop-ui
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka-broker:29092"
      CMD_ARGS: "--message.sendEnabled=true"
    networks:
      - kafka-net
    depends_on:
      - kafka

networks:
  kafka-net:
    driver: bridge

volumes:
  postgres-data:
  # FIXED: Defined the new managed infrastructure volume block
  kafka-data:
