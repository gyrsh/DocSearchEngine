server:
  port: 8086

spring:
  application:
    name: document-service
  kafka:
    # FIXED: Swapped port from 9092 to 9094 to communicate with your KRaft Docker container safely
    bootstrap-servers: localhost:9094
    consumer:
      # REMOVED: Global group-id taken out so each individual tier manages its own independent thread group state
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

document:
  events:
    topics:
      # FIXED: Standardised names to match your exact Kafdrop 3-tier system definitions
      subscription: docs.subscription.high-priority
      traffic: docs.traffic.medium-priority
      registry: docs.registry.low-priority
  batch-processing:
    traffic:
      enabled: true
      batch-size: 100
      batch-timeout-ms: 5000
      thread-pool-size: 10
      shutdown-timeout-seconds: 30
  thread-pools:
    subscription:
      core-size: 2
      max-size: 4
      queue-capacity: 50
    traffic:
      core-size: 10
      max-size: 20
      queue-capacity: 200
    registry:
      core-size: 1
      max-size: 2
      queue-capacity: 50

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

